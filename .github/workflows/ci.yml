name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff

      - name: Ruff (lint only, non-blocking on style)
        run: ruff check src tests analysis --select E,F,W --ignore E501

      - name: Pytest (unit tests only; no data downloads)
        run: pytest -q tests/
